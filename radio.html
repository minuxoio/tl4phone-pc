<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>TuneLab - Radio</title>
    <link
      href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css"
      rel="stylesheet"
      integrity="sha384-QWTKZyjpPEjISv5WaRU9OFeRpok6YctnYmDr5pNlyT2bRjXh0JMhjY6hW+ALEwIH"
      crossorigin="anonymous"
    />
    <link href="css/styles.css" rel="stylesheet" />
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link
      href="https://fonts.googleapis.com/css2?family=Noto+Sans+TC:wght@100..900&family=Roboto+Mono:ital,wght@0,100..700;1,100..700&display=swap"
      rel="stylesheet"
    />

    <script
      type="module"
      src="https://unpkg.com/@splinetool/viewer@1.9.48/build/spline-viewer.js"
    ></script>
  </head>

  <body>
    <!-- 右側信息 -->
    <div class="nav-right">
      <img src="images/cornerLabel.svg" class="nav-image" />
    </div>
    <!-- 音量控制按鈕 -->
    <div class="right-vol">
      <img
        id="volume-icon"
        src="images/icon_volume.svg"
        class="volume_icon"
        alt="Volume Icon"
        onclick="
          var audio = document.getElementById('bgm');
          audio.muted = !audio.muted;
          this.src = audio.muted
            ? 'images/icon_mute.svg'
            : 'images/icon_volume.svg';
        "
      />
    </div>
    <!-- 返回按鈕 -->
    <div class="back-button" style="z-index: 999999 !important">
      <a href="index.html" style="display: block">
        <img id="back-icon" src="images/icon_back.png" alt="Back Button" />
      </a>
    </div>
    <div id="typewriter" class="typewriter-text">
      <div class="deco-text">
        <h4>
          Drag to Rotate<br />
          點選模型上的按鈕進行互動
        </h4>
        <p>
          Radio-765379<br />
          MFG.D 2024'12<br /><br />
          [Generation]:1940s-50s<br /><br /><br /><br />
          ⬊⬊⬊⬊
        </p>
      </div>
    </div>

    <div class="logo">
      <a href="index.html">
        <img src="images/title.webp" />
      </a>
    </div>

    <!-- 中間模型 -->
    <div class="model-container">
      <div class="radio-model">
        <spline-viewer
          url="https://prod.spline.design/PGLkv54i1OvPPKLM/scene.splinecode"
        ></spline-viewer>
      </div>
    </div>

    <!-- 左側專輯 -->
    <div class="album-container">
      <!-- 第一張專輯 -->
      <div class="album">
        <img
          src="./images/bluetrain_cover.jpg"
          alt="BLUE TRAIN"
          class="album-cover"
        />

        <div class="album-info">
          <h2 class="album-title">BLUE TRAIN</h2>
          <p class="album-year">1954</p>
          <p class="album-artist">John Coltrane</p>
          <a href="radio01.html" target="_self" class="play-button"
            ><img src="./images/play_button.png" /> 播放</a
          >
        </div>
      </div>

      <!-- 第二張專輯 -->
      <div class="album">
        <img
          src="./images/moanin_cover.webp"
          alt="MOANIN’"
          class="album-cover"
        />

        <div class="album-info">
          <h2 class="album-title">MOANIN’</h2>
          <p class="album-year">1959</p>
          <p class="album-artist">Art Blakey & The Jazz Messengers</p>
          <a href="radio02.html" target="_self" class="play-button"
            ><img src="./images/play_button.png" /> 播放</a
          >
        </div>
      </div>

      <!-- 第三張專輯 -->
      <div class="album">
        <img
          src="./images/butnotforme_cover.jpg"
          alt="BUT NOT FOR ME"
          class="album-cover"
        />

        <div class="album-info">
          <h2 class="album-title">BUT NOT FOR ME</h2>
          <p class="album-year">1956</p>
          <p class="album-artist">Chet Baker</p>
          <a href="radio03.html" target="_self" class="play-button"
            ><img src="./images/play_button.png" /> 播放</a
          >
        </div>
      </div>
    </div>
    <script src="script.js"></script>
    <audio id="bgm" loop>
      <source src="mp3/titlebgm.mp3" type="audio/mp3" />
    </audio>

    <script>
      document.addEventListener("DOMContentLoaded", function () {
        const bgm = document.getElementById("bgm");

        if (bgm) {
          //  1. 在這裡設定這頁的專屬音量 (0.2 代表 20%)
          bgm.volume = 0.3;

          //  2. 讀取上一頁的播放時間，無縫接軌
          const savedTime = localStorage.getItem("bgmTime");
          if (savedTime) {
            bgm.currentTime = parseFloat(savedTime);
          }

          //  3. 安全播放機制 (避免瀏覽器阻擋自動播放導致報錯)
          let playPromise = bgm.play();
          if (playPromise !== undefined) {
            playPromise.catch((error) => {
              console.log("瀏覽器擋住自動播放了，等使用者點擊畫面...");
            });
          }

          //  4. 定時儲存當前播放時間
          setInterval(() => {
            localStorage.setItem("bgmTime", bgm.currentTime);
          }, 1000);

          //  5. 如果被擋住，使用者隨便點擊畫面任何一處就會開始播
          document.body.addEventListener(
            "click",
            function initAudio() {
              if (bgm.paused) {
                bgm.play();
              }
              document.body.removeEventListener("click", initAudio);
            },
            { once: true },
          );
        }
      });
    </script>
  </body>
</html>
